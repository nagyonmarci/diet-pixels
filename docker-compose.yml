name: proxypress

services:
  frontend:
    build:
      context: ./frontend
      args:
        BUILD_MODE: server
    image: proxypress-frontend:latest
    ports:
      - "3000:3000"
    environment:
      ENGINE_LABEL: "ProxyPress + imgproxy (Go)"
      IMGPROXY_URL: http://imgproxy:8082
      IMGPROXY_UPLOADS_DIR: /app/uploads
      IMGPROXY_OUTPUTS_DIR: /app/outputs
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
    depends_on:
      imgproxy:
        condition: service_healthy

  imgproxy:
    image: darthsim/imgproxy:latest
    environment:
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /uploads
      IMGPROXY_MAX_SRC_RESOLUTION: 500
      IMGPROXY_JPEG_PROGRESSIVE: "true"
      IMGPROXY_BIND: ":8082"
    volumes:
      - uploads:/uploads
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  uploads:
  outputs:
