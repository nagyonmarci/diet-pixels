name: Publish

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  push:
    tags:
      - 'v*.*.*'

permissions: {}

jobs:
  publish:
    name: Build, Push & Sign
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/dietpixels-frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=DietPixels Frontend
            org.opencontainers.image.description=Next.js UI and API wrapper for imgproxy-backed image compression
            org.opencontainers.image.licenses=GPL-3.0-or-later
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (OIDC keyless)
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/dietpixels-frontend@${{ steps.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "1"

  smoke-test:
    name: Smoke Test
    needs: publish
    runs-on: ubuntu-24.04
    permissions:
      packages: read
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start container
        run: |
          docker run -d --name dietpixels-smoke \
            -p 3000:3000 \
            ghcr.io/${{ github.repository_owner }}/dietpixels-frontend@${{ needs.publish.outputs.digest }}

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000/api/health; then
              echo "Container is ready"
              exit 0
            fi
            echo "Waiting... ($i/15)"
            sleep 2
          done
          echo "Container did not become ready in time"
          docker logs dietpixels-smoke
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f dietpixels-smoke
